# Copy this into a consuming repo as `.github/workflows/pr-review.yml`.
# Replace <owner> with the org/user that hosts the agents repo.
#
# Add ANTHROPIC_API_KEY as a repository secret (Settings -> Secrets and
# variables -> Actions). GITHUB_TOKEN is provided automatically.
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4 # so the agent can see this repo's .flue/ overrides

      - uses: <owner>/agents/actions/pr-review@main # @main = always-latest skills/prompts; pin @v1 for reproducible
        with:
          pr-number: ${{ github.event.pull_request.number }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional:
          # model: anthropic/claude-opus-4-7
          # override-mode: merge   # or: replace
