name: PR Review

# Dogfoods the composite action on this repo's own PRs. Other repos consume the
# same action via `uses: <owner>/agents/actions/pr-review@main` — see
# actions/pr-review/README.md and examples/consumer-workflow.yml.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  models: read # default model is github/openai/gpt-5-mini via GitHub Models

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./actions/pr-review
        with:
          pr-number: ${{ github.event.pull_request.number }}
